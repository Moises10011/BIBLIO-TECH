<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BIBLIO-TECH · Nuevo Préstamo</title>
<style>
  :root{
    --azul:#1c3f8f;
    --azul-oscuro:#122a63;
    --verde:#2fae4e;
    --gris:#f2f3f5;
    --borde:#c9ccd3;
    --texto:#2b2f38;
  }
  *{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
  body{
    background:#dfe2e6;
    margin:0;
    padding:40px 0;
    display:flex;
    justify-content:center;
    color:var(--texto);
  }
  .browser{
    width:420px;
    background:#fff;
    border-radius:4px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    overflow:hidden;
    border:1px solid var(--borde);
  }
  .browser-bar{
    background:#e9ebee;
    padding:6px 10px;
    font-size:11px;
    color:#5a5f6a;
    border-bottom:1px solid var(--borde);
  }
  .card{ padding:14px; }
  .titlebar{
    background:var(--azul);
    color:#fff;
    padding:10px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-radius:3px 3px 0 0;
    font-weight:bold;
    font-size:15px;
  }
  .titlebar .close{
    width:22px;height:22px;
    background:#fff;
    color:var(--azul);
    border-radius:3px;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:bold;
    cursor:pointer;
  }
  .panel{
    border:1px solid var(--borde);
    border-top:none;
    padding:12px;
  }
  .section-label{
    font-size:11px;
    font-weight:bold;
    color:var(--azul-oscuro);
    text-transform:uppercase;
    margin:10px 0 6px;
    letter-spacing:.4px;
  }
  .row{ display:flex; gap:6px; margin-bottom:6px; }
  input[type=text]{
    flex:1;
    padding:7px 8px;
    border:1px solid var(--borde);
    border-radius:3px;
    font-size:12px;
  }
  button.mini{
    background:var(--azul);
    color:#fff;
    border:none;
    padding:0 12px;
    border-radius:3px;
    font-size:12px;
    cursor:pointer;
  }
  button.mini:hover{ background:var(--azul-oscuro); }
  .resultado{
    background:var(--gris);
    border:1px solid var(--borde);
    border-radius:3px;
    padding:8px;
    font-size:12px;
    margin-top:4px;
    display:flex;
    justify-content:space-between;
  }
  .dias{
    display:flex;
    gap:16px;
    align-items:center;
    font-size:12px;
    margin:6px 0 12px;
  }
  .dias label{ display:flex; align-items:center; gap:4px; }
  .btn-confirmar{
    width:100%;
    background:var(--verde);
    color:#fff;
    border:none;
    padding:10px;
    border-radius:3px;
    font-size:13px;
    font-weight:bold;
    letter-spacing:.5px;
    cursor:pointer;
  }
  .btn-confirmar:hover{ filter:brightness(0.95); }
</style>
</head>
<body>

<div class="browser">
  <div class="browser-bar">🔒 www.bibliotech.com.pe/prestamo</div>
  <div class="card">
    <div class="titlebar">
      BIBLIO-TECH
      <div class="close">✕</div>
    </div>
    <div class="panel">

      <div class="section-label">1. Identificación del lector</div>
      <div class="row">
        <input type="text" id="dniLector" placeholder="DNI del lector">
        <button class="mini" onclick="validarLector()">Validar</button>
      </div>
      <div class="resultado" id="lectorResultado">— Sin validar —</div>

      <div class="section-label">2. Datos del libro</div>
      <div class="row">
        <input type="text" id="codigoISBN" placeholder="Código ISBN" value="978-3-16-148410-0">
        <button class="mini" onclick="buscarLibro()">Buscar</button>
      </div>
      <div class="resultado" id="libroResultado">
        <span>Introducción a la Visión Computacional</span>
        <span>✓</span>
      </div>

      <div class="section-label">3. Condiciones</div>
      <div class="dias">
        <label><input type="radio" name="dias" checked> 7 Días</label>
        <label><input type="radio" name="dias"> 14 Días</label>
      </div>

      <button class="btn-confirmar" onclick="registrarPrestamo()">✔ EMITIR NUEVO PRÉSTAMO</button>
    </div>
  </div>
</div>

<script>
// ---- Módulo de la rama TEST: identificación del lector ----
function validarLector(){
  const dni = document.getElementById('dniLector').value.trim();
  const box = document.getElementById('lectorResultado');
  if(dni.length < 8){
    box.innerHTML = '⚠ DNI inválido';
    return;
  }
  box.innerHTML = `<span>Lector: Julio Cesar Llodlli</span><span>✓</span>`;
}

function buscarLibro(){
  alert('Buscando libro por ISBN...');
}

function registrarPrestamo(){
  alert('Préstamo registrado correctamente.');
}
</script>

</body>
</html>
