<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BIBLIO-TECH · Iniciar sesión</title>
<style>
  :root{
    --azul:#1c3f8f;
    --azul-oscuro:#122a63;
    --verde:#2fae4e;
    --gris:#f2f3f5;
    --borde:#c9ccd3;
    --texto:#2b2f38;
  }
  *{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
  body{
    background:#dfe2e6;
    margin:0;
    padding:40px 0;
    display:flex;
    justify-content:center;
    color:var(--texto);
  }
  .browser{
    width:420px;
    background:#fff;
    border-radius:4px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    overflow:hidden;
    border:1px solid var(--borde);
  }
  .browser-bar{
    background:#e9ebee;
    padding:6px 10px;
    font-size:11px;
    color:#5a5f6a;
    border-bottom:1px solid var(--borde);
  }
  .card{ padding:14px; }
  .titlebar{
    background:var(--azul);
    color:#fff;
    padding:10px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-radius:3px 3px 0 0;
    font-weight:bold;
    font-size:15px;
  }
  .panel{
    border:1px solid var(--borde);
    border-top:none;
    padding:16px;
  }
  .section-label{
    font-size:11px;
    font-weight:bold;
    color:var(--azul-oscuro);
    text-transform:uppercase;
    margin:10px 0 6px;
    letter-spacing:.4px;
  }
  select, input[type=text], input[type=password]{
    width:100%;
    padding:8px;
    border:1px solid var(--borde);
    border-radius:3px;
    font-size:12px;
    margin-bottom:10px;
  }
  .btn-confirmar{
    width:100%;
    background:var(--azul);
    color:#fff;
    border:none;
    padding:10px;
    border-radius:3px;
    font-size:13px;
    font-weight:bold;
    letter-spacing:.5px;
    cursor:pointer;
  }
  .btn-confirmar:hover{ background:var(--azul-oscuro); }
  .msg{
    font-size:12px;
    margin-top:10px;
    text-align:center;
    color:#5a5f6a;
  }
</style>
</head>
<body>

<div class="browser">
  <div class="browser-bar">🔒 www.bibliotech.com.pe/login</div>
  <div class="card">
    <div class="titlebar">BIBLIO-TECH</div>
    <div class="panel">

      <div class="section-label">Tipo de usuario</div>
      <select id="tipoUsuario">
        <option value="admin">Administrador</option>
        <option value="colaborador">Colaborador</option>
      </select>

      <div class="section-label">Credenciales</div>
      <input type="text" id="usuario" placeholder="Usuario">
      <input type="password" id="clave" placeholder="Contraseña">

      <button class="btn-confirmar" onclick="iniciarSesion()">INICIAR SESIÓN</button>
      <div class="msg" id="mensaje"></div>
    </div>
  </div>
</div>

<script>
// ---- Módulo de la rama MAIN: login / inicialización de usuarios ----
const usuarios = {
  admin: { usuario: "admin", clave: "admin123" },
  colaborador: { usuario: "colaborador", clave: "colab123" }
};

function iniciarSesion(){
  const tipo = document.getElementById('tipoUsuario').value;
  const user = document.getElementById('usuario').value.trim();
  const pass = document.getElementById('clave').value.trim();
  const msg = document.getElementById('mensaje');

  const cuenta = usuarios[tipo];
  if(user === cuenta.usuario && pass === cuenta.clave){
    msg.style.color = '#2fae4e';
    msg.textContent = `Sesión iniciada como ${tipo}.`;
  } else {
    msg.style.color = '#c0392b';
    msg.textContent = 'Usuario o contraseña incorrectos.';
  }
}
</script>

</body>
</html>
